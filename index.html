<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐节奏游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 700px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            color: white;
        }

        #startScreen.hidden, #gameOverScreen.hidden {
            display: none;
        }

        h1 {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .instruction {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        .example {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .example-text {
            color: #48dbfb;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .example-notes {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .example-note {
            width: 70px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            border: 2px solid white;
        }

        .example-note.letter {
            background: linear-gradient(135deg, #ff6b6b, #c44569);
        }

        .example-note.arrow {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .final-score {
            font-size: 4rem;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin: 20px 0;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #aaa;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
        }

        .hud-item {
            color: white;
            font-size: 1.2rem;
        }

        .hud-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        #judgment {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        #judgment.perfect {
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        #judgment.good {
            color: #4ecdc4;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        #judgment.miss {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="700"></canvas>
        
        <div id="hud">
            <div class="hud-item">
                <div>得分</div>
                <div class="hud-value" id="scoreDisplay">0</div>
            </div>
            <div class="hud-item">
                <div>连击</div>
                <div class="hud-value" id="comboDisplay">0</div>
            </div>
            <div class="hud-item">
                <div>时间</div>
                <div class="hud-value" id="timeDisplay">60</div>
            </div>
        </div>

        <div id="judgment"></div>

        <div id="startScreen">
            <h1>🎵 音乐节奏游戏 🎵</h1>
            <p class="instruction">当带有<span class="highlight">字母</span>或<span class="highlight">方向键</span>的音符滑过</p>
            <p class="instruction"><span class="highlight">底部黄色判定区域</span>时，按下键盘上<span class="highlight">对应的键</span></p>
            
            <div class="example">
                <p class="example-text">比如看到这些音符滑过时：</p>
                <div class="example-notes">
                    <div class="example-note letter">A</div>
                    <div class="example-note arrow">↓</div>
                    <div class="example-note letter">Q</div>
                    <div class="example-note arrow">→</div>
                </div>
                <p class="example-text" style="margin-top: 15px;">分别按下键盘上的：<span class="highlight">A</span>、<span class="highlight">↓</span>、<span class="highlight">Q</span>、<span class="highlight">→</span></p>
            </div>

            <p class="instruction">按得越准确，得分越高！Perfect得100分，Good得50分</p>

            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h2>游戏结束</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats">
                <div class="stat-item">
                    <div>Perfect</div>
                    <div class="stat-value" id="perfectCount">0</div>
                </div>
                <div class="stat-item">
                    <div>Good</div>
                    <div class="stat-value" id="goodCount">0</div>
                </div>
                <div class="stat-item">
                    <div>Miss</div>
                    <div class="stat-value" id="missCount">0</div>
                </div>
                <div class="stat-item">
                    <div>最高连击</div>
                    <div class="stat-value" id="maxCombo">0</div>
                </div>
            </div>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        class RhythmGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;

                this.gameState = 'start';
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.perfectCount = 0;
                this.goodCount = 0;
                this.missCount = 0;
                this.gameTime = 60;

                this.lanes = [
                    { x: 110, width: 130, color: 'rgba(255, 107, 107, 0.1)', borderColor: '#ff6b6b' },
                    { x: 235, width: 130, color: 'rgba(254, 202, 87, 0.1)', borderColor: '#feca57' },
                    { x: 385, width: 130, color: 'rgba(72, 219, 251, 0.1)', borderColor: '#48dbfb' },
                    { x: 510, width: 130, color: 'rgba(255, 159, 243, 0.1)', borderColor: '#ff9ff3' }
                ];

                this.judgmentY = this.height - 100;
                this.judgmentPerfectRange = 25;
                this.judgmentGoodRange = 50;
                this.judgmentHitRange = 70;

                this.notes = [];
                this.noteSpeed = 2.5;
                this.noteWidth = 80;
                this.noteHeight = 50;

                this.letterKeys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
                this.arrowKeys = [
                    { key: 'ArrowUp', display: '↑' },
                    { key: 'ArrowDown', display: '↓' },
                    { key: 'ArrowLeft', display: '←' },
                    { key: 'ArrowRight', display: '→' }
                ];

                this.pressedKeys = new Set();
                this.lastNoteTime = 0;
                this.noteInterval = 1000;

                this.judgmentElement = document.getElementById('judgment');
                this.scoreDisplay = document.getElementById('scoreDisplay');
                this.comboDisplay = document.getElementById('comboDisplay');
                this.timeDisplay = document.getElementById('timeDisplay');

                this.bindEvents();
                this.gameLoop();
            }

            bindEvents() {
                const startBtn = document.getElementById('startBtn');
                const restartBtn = document.getElementById('restartBtn');

                startBtn.addEventListener('click', () => this.startGame());
                restartBtn.addEventListener('click', () => this.startGame());

                document.addEventListener('keydown', (e) => {
                    if (this.gameState !== 'playing') return;
                    
                    const key = e.key.toUpperCase();
                    
                    if (this.letterKeys.includes(key) || 
                        ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.handleKeyPress(e.key);
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.pressedKeys.delete(e.key.toUpperCase());
                    this.pressedKeys.delete(e.key);
                });
            }

            startGame() {
                this.gameState = 'playing';
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.perfectCount = 0;
                this.goodCount = 0;
                this.missCount = 0;
                this.gameTime = 60;
                this.notes = [];
                this.lastNoteTime = Date.now();
                this.noteInterval = 1000;

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');

                this.timer = setInterval(() => {
                    this.gameTime--;
                    if (this.gameTime <= 0) {
                        this.endGame();
                    }
                }, 1000);
            }

            endGame() {
                this.gameState = 'gameOver';
                clearInterval(this.timer);

                document.getElementById('finalScore').textContent = Math.floor(this.score);
                document.getElementById('perfectCount').textContent = this.perfectCount;
                document.getElementById('goodCount').textContent = this.goodCount;
                document.getElementById('missCount').textContent = this.missCount;
                document.getElementById('maxCombo').textContent = this.maxCombo;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }

            handleKeyPress(pressedKey) {
                const normalizedKey = pressedKey.length === 1 ? pressedKey.toUpperCase() : pressedKey;
                
                if (this.pressedKeys.has(normalizedKey)) return;
                this.pressedKeys.add(normalizedKey);

                let hitNote = null;
                let bestDistance = Infinity;

                for (const note of this.notes) {
                    if (note.hit) continue;

                    let noteKey = note.isArrow ? note.originalKey : note.displayKey;
                    
                    if (noteKey === normalizedKey) {
                        const distance = Math.abs(note.y - this.judgmentY);
                        if (distance < bestDistance && distance <= this.judgmentHitRange) {
                            bestDistance = distance;
                            hitNote = note;
                        }
                    }
                }

                if (hitNote) {
                    hitNote.hit = true;
                    if (bestDistance <= this.judgmentPerfectRange) {
                        this.showJudgment('PERFECT');
                        this.score += 100 * (1 + this.combo * 0.1);
                        this.perfectCount++;
                        this.combo++;
                    } else if (bestDistance <= this.judgmentGoodRange) {
                        this.showJudgment('GOOD');
                        this.score += 50 * (1 + this.combo * 0.1);
                        this.goodCount++;
                        this.combo++;
                    } else {
                        this.showJudgment('MISS');
                        this.combo = 0;
                        this.missCount++;
                    }
                    this.maxCombo = Math.max(this.maxCombo, this.combo);
                }
            }

            showJudgment(type) {
                this.judgmentElement.textContent = type;
                this.judgmentElement.className = type.toLowerCase();
                this.judgmentElement.style.opacity = '1';
                this.judgmentElement.style.transform = 'translate(-50%, -50%) scale(1.2)';

                setTimeout(() => {
                    this.judgmentElement.style.opacity = '0';
                    this.judgmentElement.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 300);
            }

            getRandomNote() {
                const isArrow = Math.random() < 0.3;
                
                if (isArrow) {
                    const randomArrow = this.arrowKeys[Math.floor(Math.random() * this.arrowKeys.length)];
                    return {
                        displayKey: randomArrow.display,
                        originalKey: randomArrow.key,
                        isArrow: true,
                        color: '#4ecdc4'
                    };
                } else {
                    const randomLetter = this.letterKeys[Math.floor(Math.random() * this.letterKeys.length)];
                    return {
                        displayKey: randomLetter,
                        originalKey: randomLetter,
                        isArrow: false,
                        color: '#ff6b6b'
                    };
                }
            }

            spawnNote() {
                const now = Date.now();
                if (now - this.lastNoteTime >= this.noteInterval) {
                    const randomLaneIndex = Math.floor(Math.random() * this.lanes.length);
                    const lane = this.lanes[randomLaneIndex];
                    const noteData = this.getRandomNote();
                    
                    const noteX = lane.x + (lane.width - this.noteWidth) / 2;
                    
                    this.notes.push({
                        displayKey: noteData.displayKey,
                        originalKey: noteData.originalKey,
                        isArrow: noteData.isArrow,
                        x: noteX,
                        y: -this.noteHeight,
                        color: noteData.color,
                        laneColor: lane.borderColor,
                        hit: false
                    });

                    this.lastNoteTime = now;
                    this.noteInterval = Math.max(600, 1000 - (60 - this.gameTime) * 7);
                }
            }

            update() {
                if (this.gameState !== 'playing') return;

                this.spawnNote();

                for (let i = this.notes.length - 1; i >= 0; i--) {
                    const note = this.notes[i];
                    note.y += this.noteSpeed;

                    if (!note.hit && note.y > this.judgmentY + this.judgmentHitRange) {
                        note.hit = true;
                        this.combo = 0;
                        this.missCount++;
                        this.showJudgment('MISS');
                    }

                    if (note.y > this.height + 50) {
                        this.notes.splice(i, 1);
                    }
                }

                this.scoreDisplay.textContent = Math.floor(this.score);
                this.comboDisplay.textContent = this.combo;
                this.timeDisplay.textContent = this.gameTime;
            }

            draw() {
                this.ctx.fillStyle = '#0a0a1a';
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.drawLanes();
                this.drawJudgmentLine();
                this.drawNotes();
            }

            drawLanes() {
                for (const lane of this.lanes) {
                    this.ctx.fillStyle = lane.color;
                    this.ctx.fillRect(lane.x, 0, lane.width, this.height);

                    this.ctx.strokeStyle = lane.borderColor;
                    this.ctx.lineWidth = 2;
                    this.ctx.globalAlpha = 0.3;
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(lane.x, 0);
                    this.ctx.lineTo(lane.x, this.height);
                    this.ctx.stroke();

                    this.ctx.beginPath();
                    this.ctx.moveTo(lane.x + lane.width, 0);
                    this.ctx.lineTo(lane.x + lane.width, this.height);
                    this.ctx.stroke();

                    this.ctx.globalAlpha = 1;
                }
            }

            drawJudgmentLine() {
                const gradient = this.ctx.createLinearGradient(0, this.judgmentY - 50, 0, this.judgmentY + 50);
                gradient.addColorStop(0, 'rgba(255, 215, 0, 0)');
                gradient.addColorStop(0.3, 'rgba(255, 215, 0, 0.2)');
                gradient.addColorStop(0.5, 'rgba(255, 215, 0, 0.4)');
                gradient.addColorStop(0.7, 'rgba(255, 215, 0, 0.2)');
                gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(100, this.judgmentY - 50, this.width - 200, 100);

                this.ctx.strokeStyle = '#ffd700';
                this.ctx.lineWidth = 4;
                this.ctx.shadowColor = '#ffd700';
                this.ctx.shadowBlur = 25;
                this.ctx.beginPath();
                this.ctx.moveTo(100, this.judgmentY);
                this.ctx.lineTo(this.width - 100, this.judgmentY);
                this.ctx.stroke();
                this.ctx.shadowBlur = 0;

                this.ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                this.ctx.fillRect(100, this.judgmentY - 35, this.width - 200, 70);
            }

            drawNotes() {
                for (const note of this.notes) {
                    if (note.hit) continue;

                    this.ctx.shadowColor = note.color;
                    this.ctx.shadowBlur = 20;

                    const gradient = this.ctx.createLinearGradient(note.x, note.y, note.x, note.y + this.noteHeight);
                    if (note.isArrow) {
                        gradient.addColorStop(0, '#4ecdc4');
                        gradient.addColorStop(1, '#44a08d');
                    } else {
                        gradient.addColorStop(0, '#ff6b6b');
                        gradient.addColorStop(1, '#c44569');
                    }
                    
                    this.ctx.fillStyle = gradient;
                    
                    const radius = 8;
                    this.ctx.beginPath();
                    this.ctx.moveTo(note.x + radius, note.y);
                    this.ctx.lineTo(note.x + this.noteWidth - radius, note.y);
                    this.ctx.quadraticCurveTo(note.x + this.noteWidth, note.y, note.x + this.noteWidth, note.y + radius);
                    this.ctx.lineTo(note.x + this.noteWidth, note.y + this.noteHeight - radius);
                    this.ctx.quadraticCurveTo(note.x + this.noteWidth, note.y + this.noteHeight, note.x + this.noteWidth - radius, note.y + this.noteHeight);
                    this.ctx.lineTo(note.x + radius, note.y + this.noteHeight);
                    this.ctx.quadraticCurveTo(note.x, note.y + this.noteHeight, note.x, note.y + this.noteHeight - radius);
                    this.ctx.lineTo(note.x, note.y + radius);
                    this.ctx.quadraticCurveTo(note.x, note.y, note.x + radius, note.y);
                    this.ctx.fill();

                    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();

                    this.ctx.shadowBlur = 0;
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 28px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.shadowBlur = 5;

                    this.ctx.fillText(
                        note.displayKey,
                        note.x + this.noteWidth / 2,
                        note.y + this.noteHeight / 2
                    );

                    this.ctx.shadowBlur = 0;
                }
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        window.addEventListener('load', () => {
            new RhythmGame();
        });
    </script>
</body>
</html>
