<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐节奏游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 700px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            color: white;
        }

        #startScreen.hidden, #gameOverScreen.hidden {
            display: none;
        }

        h1 {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .instruction {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }

        .keys {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .key-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .key-box {
            width: 60px;
            height: 60px;
            border: 3px solid #ffd700;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .final-score {
            font-size: 4rem;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin: 20px 0;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #aaa;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
        }

        .hud-item {
            color: white;
            font-size: 1.2rem;
        }

        .hud-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        #judgment {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        #judgment.perfect {
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        #judgment.good {
            color: #4ecdc4;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        #judgment.miss {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="700"></canvas>
        
        <div id="hud">
            <div class="hud-item">
                <div>得分</div>
                <div class="hud-value" id="scoreDisplay">0</div>
            </div>
            <div class="hud-item">
                <div>连击</div>
                <div class="hud-value" id="comboDisplay">0</div>
            </div>
            <div class="hud-item">
                <div>时间</div>
                <div class="hud-value" id="timeDisplay">60</div>
            </div>
        </div>

        <div id="judgment"></div>

        <div id="startScreen">
            <h1>🎵 音乐节奏游戏 🎵</h1>
            <p class="instruction">当音符滑过黄色判定线时按下对应按键</p>
            <p class="instruction">按得越准确，得分越高！</p>
            
            <div class="keys">
                <div class="key-info">
                    <div class="key-box">D</div>
                    <span style="color: #ff6b6b;">左</span>
                </div>
                <div class="key-info">
                    <div class="key-box">F</div>
                    <span style="color: #feca57;">中左</span>
                </div>
                <div class="key-info">
                    <div class="key-box">J</div>
                    <span style="color: #48dbfb;">中右</span>
                </div>
                <div class="key-info">
                    <div class="key-box">K</div>
                    <span style="color: #ff9ff3;">右</span>
                </div>
            </div>
            
            <div class="keys">
                <div class="key-info">
                    <div class="key-box">↑</div>
                    <span style="color: #1dd1a1;">上</span>
                </div>
                <div class="key-info">
                    <div class="key-box">↓</div>
                    <span style="color: #54a0ff;">下</span>
                </div>
                <div class="key-info">
                    <div class="key-box">←</div>
                    <span style="color: #ff6b6b;">左</span>
                </div>
                <div class="key-info">
                    <div class="key-box">→</div>
                    <span style="color: #ff9ff3;">右</span>
                </div>
            </div>

            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h2>游戏结束</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats">
                <div class="stat-item">
                    <div>Perfect</div>
                    <div class="stat-value" id="perfectCount">0</div>
                </div>
                <div class="stat-item">
                    <div>Good</div>
                    <div class="stat-value" id="goodCount">0</div>
                </div>
                <div class="stat-item">
                    <div>Miss</div>
                    <div class="stat-value" id="missCount">0</div>
                </div>
                <div class="stat-item">
                    <div>最高连击</div>
                    <div class="stat-value" id="maxCombo">0</div>
                </div>
            </div>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        class RhythmGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;

                this.gameState = 'start';
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.perfectCount = 0;
                this.goodCount = 0;
                this.missCount = 0;
                this.gameTime = 60;

                this.lanes = [
                    { key: 'd', x: 150, color: '#ff6b6b' },
                    { key: 'f', x: 275, color: '#feca57' },
                    { key: 'j', x: 425, color: '#48dbfb' },
                    { key: 'k', x: 550, color: '#ff9ff3' },
                    { key: 'ArrowUp', x: 150, color: '#1dd1a1' },
                    { key: 'ArrowDown', x: 275, color: '#54a0ff' },
                    { key: 'ArrowLeft', x: 425, color: '#ff6b6b' },
                    { key: 'ArrowRight', x: 550, color: '#ff9ff3' }
                ];

                this.judgmentY = this.height - 100;
                this.judgmentPerfectRange = 30;
                this.judgmentGoodRange = 60;
                this.judgmentHitRange = 80;

                this.notes = [];
                this.noteSpeed = 5;
                this.noteWidth = 80;
                this.noteHeight = 40;

                this.pressedKeys = new Set();
                this.lastNoteTime = 0;
                this.noteInterval = 600;

                this.judgmentElement = document.getElementById('judgment');
                this.scoreDisplay = document.getElementById('scoreDisplay');
                this.comboDisplay = document.getElementById('comboDisplay');
                this.timeDisplay = document.getElementById('timeDisplay');

                this.bindEvents();
                this.gameLoop();
            }

            bindEvents() {
                const startBtn = document.getElementById('startBtn');
                const restartBtn = document.getElementById('restartBtn');

                startBtn.addEventListener('click', () => this.startGame());
                restartBtn.addEventListener('click', () => this.startGame());

                document.addEventListener('keydown', (e) => {
                    if (this.gameState !== 'playing') return;
                    const key = e.key.toLowerCase();
                    if (['d', 'f', 'j', 'k'].includes(key) || 
                        ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.handleKeyPress(e.key);
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.pressedKeys.delete(e.key.toLowerCase());
                });
            }

            startGame() {
                this.gameState = 'playing';
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.perfectCount = 0;
                this.goodCount = 0;
                this.missCount = 0;
                this.gameTime = 60;
                this.notes = [];
                this.lastNoteTime = Date.now();

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');

                this.timer = setInterval(() => {
                    this.gameTime--;
                    if (this.gameTime <= 0) {
                        this.endGame();
                    }
                }, 1000);
            }

            endGame() {
                this.gameState = 'gameOver';
                clearInterval(this.timer);

                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('perfectCount').textContent = this.perfectCount;
                document.getElementById('goodCount').textContent = this.goodCount;
                document.getElementById('missCount').textContent = this.missCount;
                document.getElementById('maxCombo').textContent = this.maxCombo;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }

            handleKeyPress(key) {
                if (this.pressedKeys.has(key.toLowerCase())) return;
                this.pressedKeys.add(key.toLowerCase());

                const lane = this.lanes.find(l => 
                    l.key === key.toLowerCase() || l.key === key
                );
                if (!lane) return;

                let hitNote = null;
                let bestDistance = Infinity;

                for (const note of this.notes) {
                    if (note.hit || 
                        (note.laneKey !== key.toLowerCase() && note.laneKey !== key)) continue;

                    const distance = Math.abs(note.y - this.judgmentY);
                    if (distance < bestDistance && distance <= this.judgmentHitRange) {
                        bestDistance = distance;
                        hitNote = note;
                    }
                }

                if (hitNote) {
                    hitNote.hit = true;
                    if (bestDistance <= this.judgmentPerfectRange) {
                        this.showJudgment('PERFECT');
                        this.score += 100 * (1 + this.combo * 0.1);
                        this.perfectCount++;
                        this.combo++;
                    } else if (bestDistance <= this.judgmentGoodRange) {
                        this.showJudgment('GOOD');
                        this.score += 50 * (1 + this.combo * 0.1);
                        this.goodCount++;
                        this.combo++;
                    } else {
                        this.showJudgment('MISS');
                        this.combo = 0;
                        this.missCount++;
                    }
                    this.maxCombo = Math.max(this.maxCombo, this.combo);
                }
            }

            showJudgment(type) {
                this.judgmentElement.textContent = type;
                this.judgmentElement.className = type.toLowerCase();
                this.judgmentElement.style.opacity = '1';
                this.judgmentElement.style.transform = 'translate(-50%, -50%) scale(1.2)';

                setTimeout(() => {
                    this.judgmentElement.style.opacity = '0';
                    this.judgmentElement.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 300);
            }

            spawnNote() {
                const now = Date.now();
                if (now - this.lastNoteTime >= this.noteInterval) {
                    const randomLaneIndex = Math.floor(Math.random() * this.lanes.length);
                    const lane = this.lanes[randomLaneIndex];
                    
                    this.notes.push({
                        laneKey: lane.key,
                        x: lane.x,
                        y: -this.noteHeight,
                        color: lane.color,
                        hit: false
                    });

                    this.lastNoteTime = now;
                    this.noteInterval = Math.max(300, 600 - (60 - this.gameTime) * 5);
                }
            }

            update() {
                if (this.gameState !== 'playing') return;

                this.spawnNote();

                for (let i = this.notes.length - 1; i >= 0; i--) {
                    const note = this.notes[i];
                    note.y += this.noteSpeed;

                    if (!note.hit && note.y > this.judgmentY + this.judgmentHitRange) {
                        note.hit = true;
                        this.combo = 0;
                        this.missCount++;
                        this.showJudgment('MISS');
                    }

                    if (note.y > this.height + 50) {
                        this.notes.splice(i, 1);
                    }
                }

                this.scoreDisplay.textContent = Math.floor(this.score);
                this.comboDisplay.textContent = this.combo;
                this.timeDisplay.textContent = this.gameTime;
            }

            draw() {
                this.ctx.fillStyle = '#0a0a1a';
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.drawLanes();
                this.drawJudgmentLine();
                this.drawNotes();
                this.drawKeyIndicators();
            }

            drawLanes() {
                const lanePositions = [110, 235, 385, 510];
                for (const x of lanePositions) {
                    this.ctx.fillStyle = 'rgba(255, 215, 0, 0.05)';
                    this.ctx.fillRect(x, 0, 130, this.height);

                    this.ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.height);
                    this.ctx.stroke();

                    this.ctx.beginPath();
                    this.ctx.moveTo(x + 130, 0);
                    this.ctx.lineTo(x + 130, this.height);
                    this.ctx.stroke();
                }
            }

            drawJudgmentLine() {
                const gradient = this.ctx.createLinearGradient(0, this.judgmentY - 40, 0, this.judgmentY + 40);
                gradient.addColorStop(0, 'rgba(255, 215, 0, 0)');
                gradient.addColorStop(0.5, 'rgba(255, 215, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, this.judgmentY - 40, this.width, 80);

                this.ctx.strokeStyle = '#ffd700';
                this.ctx.lineWidth = 3;
                this.ctx.shadowColor = '#ffd700';
                this.ctx.shadowBlur = 20;
                this.ctx.beginPath();
                this.ctx.moveTo(100, this.judgmentY);
                this.ctx.lineTo(this.width - 100, this.judgmentY);
                this.ctx.stroke();
                this.ctx.shadowBlur = 0;
            }

            drawNotes() {
                for (const note of this.notes) {
                    if (note.hit) continue;

                    this.ctx.shadowColor = note.color;
                    this.ctx.shadowBlur = 15;

                    this.ctx.fillStyle = note.color;
                    this.ctx.fillRect(
                        note.x,
                        note.y,
                        this.noteWidth,
                        this.noteHeight
                    );

                    this.ctx.strokeStyle = 'white';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(
                        note.x,
                        note.y,
                        this.noteWidth,
                        this.noteHeight
                    );

                    this.ctx.shadowBlur = 0;
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    
                    let displayKey = note.laneKey;
                    if (note.laneKey === 'ArrowUp') displayKey = '↑';
                    else if (note.laneKey === 'ArrowDown') displayKey = '↓';
                    else if (note.laneKey === 'ArrowLeft') displayKey = '←';
                    else if (note.laneKey === 'ArrowRight') displayKey = '→';
                    else displayKey = displayKey.toUpperCase();

                    this.ctx.fillText(
                        displayKey,
                        note.x + this.noteWidth / 2,
                        note.y + this.noteHeight / 2
                    );
                }
            }

            drawKeyIndicators() {
                const keyLanes = [
                    { x: 150, key: 'D', color: '#ff6b6b' },
                    { x: 275, key: 'F', color: '#feca57' },
                    { x: 425, key: 'J', color: '#48dbfb' },
                    { x: 550, key: 'K', color: '#ff9ff3' }
                ];

                for (const lane of keyLanes) {
                    const isPressed = this.pressedKeys.has(lane.key.toLowerCase());
                    
                    if (isPressed) {
                        this.ctx.fillStyle = lane.color;
                        this.ctx.shadowColor = lane.color;
                        this.ctx.shadowBlur = 20;
                    } else {
                        this.ctx.fillStyle = 'rgba(50, 50, 70, 0.8)';
                        this.ctx.shadowBlur = 0;
                    }

                    this.ctx.fillRect(
                        lane.x,
                        this.judgmentY + 20,
                        this.noteWidth,
                        30
                    );

                    this.ctx.strokeStyle = isPressed ? 'white' : 'rgba(255, 215, 0, 0.5)';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(
                        lane.x,
                        this.judgmentY + 20,
                        this.noteWidth,
                        30
                    );

                    this.ctx.shadowBlur = 0;
                    this.ctx.fillStyle = isPressed ? 'white' : 'rgba(255, 255, 255, 0.7)';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(
                        lane.key,
                        lane.x + this.noteWidth / 2,
                        this.judgmentY + 35
                    );
                }
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        window.addEventListener('load', () => {
            new RhythmGame();
        });
    </script>
</body>
</html>
